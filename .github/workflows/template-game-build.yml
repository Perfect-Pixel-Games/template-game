name: TemplateGame Build

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev
  workflow_dispatch:

permissions:
  contents: read
  actions: read

concurrency:
  group: template-game-build-${{ github.ref }}
  cancel-in-progress: false

env:
  CARGO_TARGET_DIR: C:\actions-runner\cargo-target\TemplateGame

jobs:
  main-source-branch-policy:
    name: Main source branch policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Require dev or hotfix source for main
        shell: cmd
        run: |
          if not "%GITHUB_EVENT_NAME%"=="pull_request" exit /b 0
          if not "%GITHUB_BASE_REF%"=="main" exit /b 0
          if "%GITHUB_HEAD_REF%"=="dev" exit /b 0
          if "%GITHUB_HEAD_REF:~0,7%"=="hotfix/" exit /b 0
          echo Pull requests into main must come from dev or hotfix/*.
          echo Actual source branch: %GITHUB_HEAD_REF%
          exit /b 1

  validate:
    name: Validate TemplateGame on Windows
    needs: main-source-branch-policy
    runs-on: [self-hosted, Windows]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Validate TemplateGame
        shell: cmd
        run: scripts\validate.cmd

  package:
    name: Package windows-x64 ${{ matrix.configuration }} on Windows
    # Pull requests only validate. Packaged artifacts are produced only after
    # changes have landed on dev or main.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/dev' || github.ref == 'refs/heads/main')
    needs: validate
    runs-on: [self-hosted, Windows]
    strategy:
      fail-fast: false
      matrix:
        configuration:
          - test
          - shipping
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Verify Rust tools
        shell: cmd
        run: |
          where cargo
          where rustup

      - name: Install selected Rust target
        shell: cmd
        run: rustup target add x86_64-pc-windows-msvc

      - name: Package TemplateGame
        shell: cmd
        run: >-
          scripts\package.cmd
          --platform windows-x64
          --configuration "${{ matrix.configuration }}"
          --target game

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: template-game-windows-x64-${{ matrix.configuration }}
          path: artifacts/packages/template-game/windows-x64/${{ matrix.configuration }}/*.tar.gz
          if-no-files-found: error


  dev-release:
    name: Publish tagged dev prerelease
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    needs: package
    runs-on: [self-hosted, Windows]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release-downloads
          merge-multiple: true

      - name: Calculate next dev version tag
        id: next-version
        uses: actions/github-script@v7
        with:
          script: |
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const versions = tags
              .map((tag) => tag.name.match(/^0\.(\d+)\.(\d+)$/))
              .filter(Boolean)
              .map((match) => ({
                minor: Number(match[1]),
                patch: Number(match[2]),
              }))
              .sort((left, right) => left.minor - right.minor || left.patch - right.patch);
            const latestVersion = versions.at(-1);
            const nextMinor = latestVersion === undefined ? 0 : latestVersion.minor;
            const nextPatch = latestVersion === undefined ? 0 : latestVersion.patch + 1;
            core.setOutput('tag', `0.${nextMinor}.${nextPatch}`);

      - name: Create release tag
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next-version.outputs.tag }}" "%GITHUB_SHA%"
          git push origin "${{ steps.next-version.outputs.tag }}"

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next-version.outputs.tag }}
          name: TemplateGame Dev ${{ steps.next-version.outputs.tag }}
          draft: false
          prerelease: true
          files: artifacts/release-downloads/*.tar.gz

  main-release:
    name: Publish tagged main release
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: [self-hosted, Windows]
    permissions:
      contents: write
      actions: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/release-downloads
          merge-multiple: true

      - name: Calculate next main version tag
        id: next-version
        uses: actions/github-script@v7
        with:
          script: |
            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const versions = tags
              .map((tag) => tag.name.match(/^0\.(\d+)\.(\d+)$/))
              .filter(Boolean)
              .map((match) => ({
                minor: Number(match[1]),
                patch: Number(match[2]),
              }))
              .sort((left, right) => left.minor - right.minor || left.patch - right.patch);
            const latestVersion = versions.at(-1);
            const nextMinor = latestVersion === undefined ? 1 : latestVersion.minor + 1;
            core.setOutput('tag', `0.${nextMinor}.0`);

      - name: Create release tag
        shell: cmd
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.next-version.outputs.tag }}" "%GITHUB_SHA%"
          git push origin "${{ steps.next-version.outputs.tag }}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.next-version.outputs.tag }}
          name: TemplateGame ${{ steps.next-version.outputs.tag }}
          draft: false
          prerelease: false
          files: artifacts/release-downloads/*.tar.gz
